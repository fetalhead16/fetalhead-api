services:
  web:
    build: .
    container_name: fetal-head-app
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: fetal-head-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
